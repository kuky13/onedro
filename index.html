    <!-- Bot detection redirect para device test preview edge function -->
    <script>
      (function() {
        var BOT_USER_AGENTS = [
          "facebookexternalhit", "whatsapp", "telegrambot", "slurp", "googlebot",
          "bingbot", "yandexbot", "duckduckbot", "baiduspider", "sogou", "exabot",
          "discordbot", "twitterbot", "linkedinbot", "skypeuripreview", "vkshare",
          "pinterest", "embedly", "quora", "rogerbot", "facebot", "oembed", "vimeo",
          "ico", "applebot", "metainspector"
        ];
        var ua = navigator.userAgent.toLowerCase();
        var isBot = BOT_USER_AGENTS.some(function(bot) { return ua.indexOf(bot) !== -1; });
        var isTestRoute = window.location.pathname.indexOf('/testar/') === 0;
        if (isBot && isTestRoute) {
          var token = window.location.pathname.split('/testar/')[1];
          window.location.replace('https://oghjlypdnmqecaavekyr.supabase.co/functions/v1/device-test-preview?token=' + encodeURIComponent(token));
        }
      })();
    </script>

    <script>
      (function(){
        const isInstalled = window.matchMedia('(display-mode: standalone)').matches || (('standalone' in window.navigator) && (window.navigator.standalone === true));
        const onDashboard = window.location.pathname.startsWith('/dashboard');
        if ('serviceWorker' in navigator) {
          const sendInstalledFlag = () => {
            try {
              if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'SET_PWA_INSTALLED', value: isInstalled });
              }
            } catch {}
          };
          sendInstalledFlag();
          window.addEventListener('load', sendInstalledFlag);
        }
        if (onDashboard && isInstalled) {
          if (!window.__ONESIGNAL_INIT__) {
            window.__ONESIGNAL_INIT__ = true;
            window.OneSignalDeferred = window.OneSignalDeferred || [];
            window.OneSignalDeferred.push(async function(OneSignal) {
              await OneSignal.init({
                appId: "0dc51c5c-74a5-4076-9b12-331c65cae23b",
              });
            });
          }
        }
      })();
    </script>

    <!-- PWA Registration Script -->
    <script>
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registrado com sucesso:', registration.scope);

              // Check for updates (sem prompt repetitivo)
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      if (!window.__SW_UPDATE_PROMPTED__) {
                        window.__SW_UPDATE_PROMPTED__ = true;
                        console.log('Atualização disponível para o app');
                        const event = new CustomEvent('sw-update-available');
                        window.dispatchEvent(event);
                      }
                    }
                  });
                }
              });
            })
            .catch(error => {
              console.log('Falha no registro do SW:', error);
            });
        });

        // controllerchange será tratado pelo hook de PWA quando o usuário aceitar atualizar
      }

      // iOS Standalone Detection
      if (window.navigator.standalone) {
        // Running as PWA on iOS
        document.body.classList.add('ios-pwa');
      }

      // Prevent zoom on double tap (iOS)
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);

      // Handle orientation changes
      window.addEventListener('orientationchange', () => {
        setTimeout(() => {
          window.scrollTo(0, 1);
        }, 500);
      });

      // Disable context menu on images and links in PWA mode
      if (window.matchMedia('(display-mode: standalone)').matches) {
        document.addEventListener('contextmenu', e => {
          if (e.target.tagName === 'IMG' || e.target.tagName === 'A') {
            e.preventDefault();
          }
        });
      }
    </script>
