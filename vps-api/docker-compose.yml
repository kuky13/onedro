version: '3.8'

services:
  # Nossa API de Download (OneDrip)
  api:
    build: .
    image: onedrip-api:latest
    container_name: onedrip-api
    restart: unless-stopped
    volumes:
      - ./downloads:/app/downloads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ALLOWED_ORIGINS=*

  # Evolution API (WhatsApp)
  evolution:
    image: atrevoltadigital/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-changeme}
      - LOG_LEVEL=warn
    volumes:
      - evolution_data:/evolution/data

  # Caddy (Servidor Web + SSL Automático)
  caddy:
    image: caddy:alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - evolution

volumes:
  caddy_data:
  caddy_config:
  evolution_data:
